<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand" [routerLink]="isAdmin() ? '/admin/livres' : '/user/catalogue'">
      <i class="fas fa-book-open me-2"></i>
      <span class="fw-bold">Bibliothèque</span>
      <small class="text-warning ms-2">En Ligne</small>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav me-auto">
        @if (currentUser){
          <ng-container>
            @if (isAdmin()){
              <ng-container>
                <li class="nav-item">
                  <a class="nav-link" [routerLink]="['/admin/livres']" routerLinkActive="active">
                    <i class="fas fa-book me-1"></i> Livres
                  </a>
                </li>
              </ng-container>
            }

            @if (isUser()){
              <ng-container >
                <li class="nav-item">
                  <a class="nav-link" [routerLink]="['/user/catalogue']" routerLinkActive="active">
                    <i class="fas fa-book me-1"></i> Catalogue
                  </a>
                </li>

              </ng-container>
            }

          </ng-container>
        }

      </ul>

      <div class="navbar-nav">
        @if (currentUser){
          <ng-container>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button"
                 data-bs-toggle="dropdown">
                <div class="avatar-circle me-2">
                  <i class="fas fa-user"></i>
                </div>
                <span class="fw-medium">{{ currentUser.username }}</span>
                @if (isAdmin()){
                  <small class="badge bg-warning text-dark ms-2">Admin</small>
                }
                @if (isUser()){
                  <small class="badge bg-info ms-2">User</small>
                }

              </a>
              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <a class="dropdown-item" [routerLink]="isAdmin() ? '/admin/livres' : '/user/catalogue'">
                    <i class="fas fa-tachometer-alt me-2"></i> Tableau de bord
                  </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                  <a class="dropdown-item text-danger" (click)="logout($event)" style="cursor: pointer;">
                    <i class="fas fa-sign-out-alt me-2"></i> Déconnexion
                  </a>
                </li>
              </ul>
            </li>
          </ng-container>
        }
      </div>
    </div>
  </div>
</nav>
